name: Deploy backend

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-event-management-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_PUBLIC_HEALTH_URL: ${{ vars.SERVER_PUBLIC_HEALTH_URL }}
      SERVER_DEPLOY_BASE: ${{ vars.SERVER_DEPLOY_BASE }}
    steps:
      - name: Decode production env on runner
        env:
          SERVER_ENV_B64: ${{ secrets.SERVER_ENV_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${SERVER_ENV_B64:-}" ]; then
            echo "ERROR: SERVER_ENV_B64 secret is empty" >&2
            exit 1
          fi
          printf '%s' "$SERVER_ENV_B64" | tr -d '\n\r \t' | base64 -d > .env.production
          if ! grep -q '^MONGODB_URI=' .env.production; then
            echo "ERROR: decoded .env.production is missing MONGODB_URI" >&2
            exit 1
          fi
          chmod 644 .env.production
          echo "Decoded .env.production successfully"

      - name: Copy env file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_VM_HOST }}
          username: ${{ secrets.DEV_VM_USER }}
          key: ${{ secrets.DEV_VM_SSH_PRIVATE_KEY }}
          source: ".env.production"
          target: "${{ vars.SERVER_DEPLOY_BASE }}/"
          overwrite: true

      - name: Deploy backend over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEV_VM_HOST }}
          username: ${{ secrets.DEV_VM_USER }}
          key: ${{ secrets.DEV_VM_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          request_pty: true
          envs: SERVER_PUBLIC_HEALTH_URL,SERVER_DEPLOY_BASE
          script_stop: false
          script: |
            set -euo pipefail
            BASE="${SERVER_DEPLOY_BASE:-/home/dhirajchaudhari789/apps/event-management/server}"
            mkdir -p "$BASE"
            cd "$BASE"

            BRANCH='${{ github.ref_name }}'
            if [ -d .git ]; then
              git fetch origin
            else
              git clone "https://github.com/${{ github.repository }}.git" .
            fi
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            if [ ! -f .env.production ]; then
              echo "ERROR: .env.production not found after SCP" >&2
              exit 1
            fi
            chmod 600 .env.production

            : "${SERVER_PUBLIC_HEALTH_URL:=https://api-events.orbitalops.net/health}"
            export EM_ENV_FILE=.env.production
            export EM_PUBLIC_HEALTH_URL="$SERVER_PUBLIC_HEALTH_URL"
            export EM_IMAGE_TAG='${{ github.sha }}'
            export EM_BLUE_PORT=18082
            export EM_GREEN_PORT=28082
            export EM_APP_PORT=8000
            export EM_BLUE_CONTAINER=event-management-api-blue
            export EM_GREEN_CONTAINER=event-management-api-green
            export EM_NGINX_UPSTREAM_FILE=/etc/nginx/conf.d/event-management-api-upstream.conf
            export EM_NGINX_UPSTREAM_NAME=event_management_api_active
            export EM_PUBLIC_HEALTH_SUCCESS_COUNT=1
            export EM_PUBLIC_HEALTH_MAX_TIME_SECONDS=8
            export EM_DRAIN_SECONDS=20

            bash script/ensure-nginx-upload-limit.sh || true
            bash script/deploy-bluegreen.sh
